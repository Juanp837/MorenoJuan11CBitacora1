<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora Juan Moreno</title>
    <style>
        html, body{
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        body{
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        header {
            padding: 50px 20px;
            background-color: #398c37;
            color: white;
            box-shadow: 0 4px 10px rgba(194, 62, 62, 0.3);}
        h1 {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 auto;
            border-right: .15em solid #7126bb;
            font-size: 2.5rem;
            letter-spacing: 2px;
           
            text-shadow:
                0 0 5px #fff,
                0 0 10px #7126bb,
                0 0 20px #7126bb,
                0 0 40px #7126bb;
           
            animation:
                typing 3.5s steps(35, end),
                blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #7126bb; }
        }
       
        main{
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: rgb(206, 40, 40);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(13, 104, 202, 0.1);
            border-left: 6px solid #5198bf;
            margin-top: 20px;
            text-align: left;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .tarjeta-semana {
        display: flex;
        gap: 20px; /* Espacio entre el PDF y el texto */
        align-items: flex-start; /* Alinea el contenido arriba */
        }
        .pdf-container {
        flex: 1;
        min-width: 300px;
        }
        .texto-container {
        flex: 1;
        }
        @media (max-width: 768px) {
        .tarjeta-semana {
        flex-direction: column;
        }
        .pdf-container {
        width: 100%;
        }
        }  
        .card:hover {
        transform: scale(1.03); /* Crece un 3% */
        box-shadow: 0 10px 25px rgba(50, 188, 200, 0.2); /* Sombra más profunda y morada */
        cursor: pointer;
        }
       
        footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 2px solid rgb(75, 89, 181);
            background-color: rgb(11, 162, 51);
            font-weight: bold;}
        footer img {
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }

        footer img:hover {
            transform: scale(1.25); /* Efecto Zoom */
            filter: brightness(1.1); /* Un toque de brillo extra */
        }
       
    </style>
</head>
<body>
    <header>
        <h1>Bitácora Segunda y Tercera Unidad</h1>
    </header>
    <main>
        <div class="card tarjeta-semana">
    <div class="pdf-container">
        <embed src="file:///C:/Users/Alumno%20Capouilliez/Downloads/Introducci%C3%B3n%20Arduino%201.pdf" type="application/pdf" width="100%" height="400px" />
    </div>

    <div class="texto-container">
        <h3>S1 Introducción a Arduino</h3>
        <p>Arduino es una plataforma de código abierto que está basada en hardware y software.</p>
        <ul>
            <li>Tipos de Arduinos</li>
            <li>Partes del Arduino UNO</li>
        </ul>
    </div>
    </main>
    <footer>
        <span>@Juanp_mh_</span>
        <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" height="25" width="100">
    </footer>
</body>
</html>
